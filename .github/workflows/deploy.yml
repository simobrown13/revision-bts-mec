name: Deploy App

on:
  push:
    branches: [main]
    paths: ['index.html']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download index.html only
        run: curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/main/index.html" -o index.html

      - name: Prepare site
        run: mkdir _site && mv index.html _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
